<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EE Community Job Board</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <header>
    <div class="header-inner">
      <div class="brand">
        <h1>💼 EE Community Job Board</h1>
        <p>Early Education &amp; Childcare roles across the North West</p>
      </div>
      <a class="btn-add" href="add-job.html">＋ Add Job</a>
    </div>
  </header>

  <div class="controls">
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input id="search" type="text" placeholder="Search job title, company or keyword…" />
    </div>
    <select id="cat-filter">
      <option value="">All categories</option>
    </select>
    <select id="loc-filter">
      <option value="">All locations</option>
    </select>
  </div>

  <div class="stats-bar">
    <span id="count">Loading…</span>
  </div>

  <div class="grid" id="grid"></div>

  <footer>
    EE Community Job Board &nbsp;·&nbsp; Updated regularly &nbsp;·&nbsp; Free to post
  </footer>

  <script src="app.js"></script>
</body>
</html>
